# Publish to npm on version tag push (e.g. 0.3.0). Provenance is signed via
# GitHub's OIDC token; requires npm Trusted Publisher set on npmjs.com with
# this repo + workflow filename, or NPM_TOKEN in repo secrets as a fallback.
# Triggered by `npm run release` (local), which tags and pushes.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # for npm provenance via OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
