name: Bug report
description: Report a problem with the DoneThat n8n node
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include API keys, personal data, or private workspace data.
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: The n8n-nodes-donethat version you are using.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: n8n-version
    attributes:
      label: n8n version
      placeholder: "1.x.x"
    validations:
      required: true
  - type: dropdown
    id: install-type
    attributes:
      label: n8n installation type
      options:
        - n8n Cloud
        - Self-hosted Docker
        - Self-hosted npm
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest workflow or node setup that reproduces the issue.
      placeholder: |
        1. Add DoneThat node
        2. Select ...
        3. Run workflow
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste errors with secrets removed.
      render: shell
    validations:
      required: false
